<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NeuroSpectrum — Entrar</title>
  <meta name="description" content="Acesse o sistema NeuroSpectrum para gerenciar pacientes, consultas e laudos." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="login-page">
  <div class="deco"><span></span><span></span><span></span><span></span></div>

  <div class="login-card">
    <div class="brand">
      <img src="assets/brain-logo.png" alt="NeuroSpectrum" />
      <h1>NeuroSpectrum</h1>
    </div>
    <p class="welcome">Bem-vindo ao NeuroSpectrum</p>

    <form data-redirect="consultas.html">
      <div class="field">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        <input type="email" required placeholder="E-mail" />
      </div>

      <div class="field">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input id="senha" type="password" required placeholder="Senha" />
        <button type="button" class="toggle" data-toggle-password="#senha" aria-label="Mostrar senha">
          <svg class="eye-on" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg class="eye-off hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>

      <div class="forgot"><a href="#">Esqueci minha senha</a></div>

      <button type="submit" class="btn btn-primary">Entrar</button>

      <button type="button" class="btn btn-outline">
        <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.4 29.3 35.5 24 35.5c-6.4 0-11.5-5.1-11.5-11.5S17.6 12.5 24 12.5c2.9 0 5.6 1.1 7.6 2.9l5.7-5.7C33.6 6.3 29 4.5 24 4.5 13.2 4.5 4.5 13.2 4.5 24S13.2 43.5 24 43.5 43.5 34.8 43.5 24c0-1.2-.1-2.3-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 16 19 12.5 24 12.5c2.9 0 5.6 1.1 7.6 2.9l5.7-5.7C33.6 6.3 29 4.5 24 4.5 16.3 4.5 9.6 8.9 6.3 14.7z"/><path fill="#4CAF50" d="M24 43.5c5.2 0 9.9-1.9 13.4-5l-6.2-5.2c-1.9 1.3-4.3 2.2-7.2 2.2-5.3 0-9.7-3.1-11.3-7.4l-6.5 5C9.5 39 16.2 43.5 24 43.5z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.1 5.8l6.2 5.2c-.4.4 6.6-4.8 6.6-15 0-1.2-.1-2.3-.4-3.5z"/></svg>
        Entrar com Google
      </button>
      <button type="button" class="btn btn-outline">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M16.365 1.43c0 1.14-.493 2.27-1.177 3.08-.744.9-1.95 1.57-2.99 1.48-.135-1.12.42-2.29 1.08-3.04.74-.84 2.06-1.49 3.09-1.52zM21.21 17.51c-.59 1.3-.87 1.88-1.63 3.03-1.06 1.6-2.56 3.6-4.42 3.6-1.66 0-2.08-1.08-4.33-1.07-2.25.01-2.71 1.09-4.36 1.07-1.86-.02-3.27-1.82-4.34-3.42-2.97-4.47-3.28-9.7-1.45-12.49 1.3-1.98 3.35-3.14 5.27-3.14 1.96 0 3.19 1.07 4.81 1.07 1.57 0 2.53-1.07 4.79-1.07 1.71 0 3.52.93 4.81 2.54-4.23 2.32-3.54 8.36.85 9.88z"/></svg>
        Entrar com Apple
      </button>

      <p class="signup">Ainda não tem uma conta? <a href="cadastro-paciente.html">Criar conta</a></p>
    </form>
  </div>

  <style>.hidden{display:none!important}</style>
  <script src="app.js"></script>
</body>
</html>
