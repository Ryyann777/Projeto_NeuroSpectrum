<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Novo Laudo — NeuroSpectrum</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
<aside class="sidebar">
  <div class="brand-block">
    <img src="assets/brain-logo.png" alt="">
    <span>NeuroSpectrum</span>
  </div>
  <nav class="nav">
    <a href="dashboard.html"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Dashboard</a>
    <a href="cadastro-paciente.html"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Pacientes</a>
    <a href="consultas.html"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>Consultas</a>
    <a href="laudo.html"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/></svg>Avaliações</a>
    <a href="relatorios.html"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Relatórios</a>
    <a href="recursos.html"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>Recursos</a>
  </nav>
  <div class="sidebar-footer">
    <a href="#">⚙️ Configurações</a>
    <a href="#">❔ Ajuda</a>
  </div>
</aside>
    <main class="main">
      <header class="page-header"><div><h1>Formulário de Laudo</h1><p>Preencha as informações do laudo do paciente.</p></div></header>
      <form data-redirect="consultas.html">
        <section class="form-section">
          <div class="form-grid">
            <label class="field-block"><span>Paciente</span><input class="input"></label>
            <label class="field-block"><span>Data do Atendimento</span><input type="date" class="input"></label>
            <label class="field-block"><span>Profissional Responsável</span><input class="input"></label>
            <label class="field-block"><span>Especialidade</span><input class="input"></label>
          </div>
        </section>
        <section class="form-section">
          <h2>Avaliação Clínica</h2>
          <div class="form-grid full">
            <label class="field-block"><span>Queixa Principal</span><textarea rows="3" class="input"></textarea></label>
            <label class="field-block"><span>Histórico</span><textarea rows="4" class="input"></textarea></label>
            <label class="field-block"><span>Diagnóstico</span><textarea rows="3" class="input"></textarea></label>
            <label class="field-block"><span>Conduta / Plano Terapêutico</span><textarea rows="4" class="input"></textarea></label>
          </div>
        </section>
        <section class="form-section">
          <div class="form-grid">
            <label class="field-block"><span>CID</span><input class="input"></label>
            <label class="field-block"><span>Próximo Retorno</span><input type="date" class="input"></label>
          </div>
        </section>
        <div class="form-actions">
          <button type="submit" class="btn-sm" style="background:var(--brand);color:#fff">Salvar Laudo</button>
          <button type="button" class="btn-sm" data-goto="consultas.html" style="background:var(--dark-panel);color:#fff">Cancelar</button>
        </div>
      </form>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
